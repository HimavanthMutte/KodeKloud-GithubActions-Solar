name: Solar System Workflow

on: 
  workflow_dispatch:
  push:
permissions:
  write: packages
  read: packages
jobs:
    
  building:
    runs-on: ubuntu-latest
    steps:

      - name: Checking Out Repo
        uses: actions/checkout@v7

      - name: Building Docker Image
        run: docker build -t ci-learning . 

      - name: Saving Image
        run: docker save ci-learning -o ci-learning.jar

      - name: Uploading Image
        uses: actions/upload-artifact@v7
        with: 
          name: ci-learning-image
          path: ./ci-learning.jar

  pushing_docker:
    runs-on: ubuntu-latest
    needs: building
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v7
        with: 
          name: ci-learning-image

      - name: Docker Login
        uses: docker/login-action@v4
        with: 
          username: himu26
          password: "@4762105HH"
      
      - name: Loading Image
        run: docker load -i ci-learning.jar

      - name: Retagging 
        run: docker tag ci-learning docker.io/himu26/ci:${{ github.sha }}

      - name: Pushing Image
        run: docker push docker.io/himu26/ci:${{ github.sha }}
  
  pushing_ghcr:
    runs-on: ubuntu-latest
    needs: building
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v7
        with: 
          name: ci-learning-image

      - name: Docker Login
        uses: docker/login-action@v4
        with: 
          registry: ghcr.io
          username: himavanthmutte
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Loading Image
        run: docker load -i ci-learning.jar

      - name: Retagging 
        run: docker tag ci-learning ghcr.io/himavanthmutte/ci:${{ github.sha }}

      - name: Pushing Image
        run: docker push ghcr.io/himavanthmutte/ci:${{ github.sha }}

  