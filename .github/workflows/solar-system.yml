name: Solare System Workflow

on: 
  push:
  workflow_dispatch:

jobs:
  building:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t ${{ secrets.ECR_URI }}:${{ github.sha }} .

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pushing to ECR
        run: docker push ${{ secrets.ECR_URI }}:${{ github.sha }}
      
      - name: Download ECS Task Def File
        run: aws ecs describe-task-definition --task-definition ecr-practice-1-task-def --query taskDefinition > task-def.json

      - name: Updating Image in Task Definition File
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: node-app
          image: '${{ secrets.ECR_URI }}:${{ github.sha }}'

      - name: Deploy ECS Service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2

        with:
          task-definition: task-def.json
          service: ecr-practice-1-task-def-service-5h5zdm59
          cluster: ecr-practice-1-cluster
          wait-for-service-stability: true