name: Solar System
on: push
env:
  MONGO_URI: ${{ vars.MONGO_URI }}
  MONGO_USERNAME: ${{ vars.MONGO_USER }}
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
jobs:
  coverage_testing:
    name: Coverage Testing - ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node_v: [18,20]
        os: [ubuntu-latest,macos-latest]
    steps:
      - name: Checking Out
        uses: actions/checkout@v7
      
      - name: Setting up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache Dependencies
        uses: actions/checkout@v6
        with:
          key: ${{ matrix.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          path: node_modules

      - name: Installing Dependencies
        run: npm install

      - name: Coverage Testing
        continue-on-error: true
        run: npm run coverage

  unit_testing:
    strategy:
      matrix:
        node_v: [18,20]
        os: [ubuntu-latest,macos-latest]
    name: Unit Testing - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      
      - name: Checking Out
        uses: actions/checkout@v7
      
      - name: Setting up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_v }}

      - name: Cache Dependencies
        uses: actions/checkout@v6
        with:
          key: ${{ matrix.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          path: node_modules

      - name: Installing Dependencies
        run: npm install

      - name: Unit Tests
        run: npm test      