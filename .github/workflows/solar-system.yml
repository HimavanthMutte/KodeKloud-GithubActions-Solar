name: solar-system-workflow
on:
  push:
  workflow_dispatch:
jobs:
  building:
    runs-on: ubuntu-latest
    steps:
      - name: Checking out Repo
        uses: actions/checkout@v7

      - name: Setting Up Node Runtime
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Caching Dependencies
        uses: actions/cache@v6
        with:
          path: ./node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      
      - name: Installing Dependencies
        run: npm ci
  
  owasp-dependency-check:
    runs-on: ubuntu-latest
    needs: building

    steps:
      - name: Checking out Repo
        uses: actions/checkout@v7

      - name: Setting Up Node Runtime
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "solar-system"
          path: "."
          format: "HTML"
          out: "owasp-reports"
          args: >
            --disableNodeAudit

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: owasp-reports/*.html

      - name: Check Generated Files
        run: ls -R

  npm-audit-check:
    runs-on: ubuntu-latest
    needs: building

    steps:
      - name: Checking out Repo
        uses: actions/checkout@v7

      - name: Setting Up Node Runtime
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Caching Dependencies
        uses: actions/cache@v6
        with:
          path: ./node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      
      - name: Installing Dependencies
        run: npm ci

      - name: Audit Check
        run: npm audit --audit-level=high --json > audit.json
        continue-on-error: true
      
      - name: Upload Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit.json
        
  uni-testing:
    runs-on: ubuntu-latest
    needs: [owasp-dependency-check,npm-audit-check]

    steps:
      - name: Checking out Repo
        uses: actions/checkout@v7

      - name: Setting Up Node Runtime
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Caching Dependencies
        uses: actions/cache@v6
        with:
          path: ./node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      
      - name: Installing Dependencies
        run: npm ci

      - name: Performing Unit Tests
        run: npm test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-result
          path: test-results.xml

      - run: ls -R

  code-coverage:
    runs-on: ubuntu-latest
    needs: [owasp-dependency-check,npm-audit-check]

    steps:
      - name: Checking out Repo
        uses: actions/checkout@v7

      - name: Setting Up Node Runtime
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Caching Dependencies
        uses: actions/cache@v6
        with:
          path: ./node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      
      - name: Installing Dependencies
        run: npm ci

      - name: Performing Unit Tests
        run: npm trun coverage

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: coverage-result
          path: ./coverage

      
      