name: Solar System Workflow

on: 
  workflow_dispatch:
  push:
permissions:
  contents: read    
  packages: write

jobs:
    
  building:
    runs-on: ubuntu-latest
    steps:

      - name: Checking Out Repo
        uses: actions/checkout@v7

      - name: Building Docker Image
        run: docker build -t ci-learning . 

      - name: Saving Image
        run: docker save ci-learning -o ci-learning.jar

      - name: Uploading Image
        uses: actions/upload-artifact@v7
        with: 
          name: ci-learning-image
          path: ./ci-learning.jar

  pushing_docker:
    runs-on: ubuntu-latest
    needs: building
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v7
        with: 
          name: ci-learning-image

      - name: Docker Login
        uses: docker/login-action@v4
        with: 
          username: himu26
          password: "@4762105HH"
      
      - name: Loading Image
        run: docker load -i ci-learning.jar

      - name: Retagging 
        run: docker tag ci-learning docker.io/himu26/ci:${{ github.sha }}

      - name: Pushing Image
        run: docker push docker.io/himu26/ci:${{ github.sha }}
  
  pushing_ghcr:
    runs-on: ubuntu-latest
    needs: building
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v7
        with: 
          name: ci-learning-image

      - name: Docker Login
        uses: docker/login-action@v4
        with: 
          registry: ghcr.io
          username: himavanthmutte
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Loading Image
        run: docker load -i ci-learning.jar

      - name: Retagging 
        run: docker tag ci-learning ghcr.io/himavanthmutte/ci:${{ github.sha }}

      - name: Pushing Image
        run: docker push ghcr.io/himavanthmutte/ci:${{ github.sha }}

  pushing_ecr:
    runs-on: ubuntu-latest
    needs: building
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v7
        with: 
          name: ci-learning-image

      - name: AWS Credentials Configure
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_KEY }}
          aws-region: ap-south-1

      - name: Loggin into ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Loading Image
        run: docker load -i ci-learning.jar

      - name: Retagging 
        run: docker tag ci-learning ${{ secrets.ECR_URI }}:${{ github.sha }}

      - name: Pushing Image
        run: docker push ${{ secrets.ECR_URI }}:${{ github.sha }}
  
  deploying:
    needs: [pushing_docker,pushing_ghcr,pushing_ecr]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying Containers
        uses: appleboy/ssh-action@v1
        with:
          host: 13.232.136.99
          username: himu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 556405564188.dkr.ecr.ap-south-1.amazonaws.com

            docker images
            docker ps
            docker stop app || true
            docker rm app || true
            docker run -d -p 3000:3000 --name app ${{ secrets.ECR_URI }}:${{ github.sha }}
