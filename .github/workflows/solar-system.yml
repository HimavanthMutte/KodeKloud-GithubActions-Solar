name: Solar System
on: push
env:
  MONGO_URI: ${{ vars.MONGO_URI }}
  MONGO_USERNAME: ${{ vars.MONGO_USER }}
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
jobs:
  coverage_testing:
    name: Unit Testing - ubuntu.latest
    runs-on: ubuntu-latest
    steps:
      - name: Checking Out
        uses: actions/checkout@v7
      
      - name: Setting up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Installing Dependencies
        run: npm install

      - name: Coverage Testing
        continue-on-error: true
        run: npm run coverage

  unit_testing:
    strategy:
      matrix:
        node_v: [18,19,20]
        os: [ubuntu-latest,windows-latest]
        exclude:
          - node_v: 20
            os: windows-latest
    name: Unit Testing - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checking Out
        uses: actions/checkout@v7
      
      - name: Setting up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_v }}

      - name: Installing Dependencies
        run: npm install

      - name: Unit Tests
        run: npm test      